<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swarm-Sim</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header id="header">
    <div class="header-left">
      <h1>Swarm-Sim</h1>
      <span class="subtitle">Multi-Agent Social Simulation</span>
    </div>
    <div class="header-center">
      <span id="status-badge" class="badge">IDLE</span>
      <span id="round-info">Round 0/0</span>
      <span id="agent-count">0 agents</span>
      <span id="token-count" class="token-counter">0 tokens</span>
    </div>
    <div class="header-right">
      <button id="btn-new-sim" class="primary" onclick="openLaunchModal()">New Simulation</button>
      <button id="btn-pause" onclick="pauseSim()" disabled>Pause</button>
      <button id="btn-resume" onclick="resumeSim()" disabled>Resume</button>
      <button id="btn-stop" onclick="stopSim()" disabled>Stop</button>
    </div>
  </header>

  <!-- Scenario banner -->
  <div id="scenario-banner" class="scenario-banner hidden">
    <span class="scenario-label">SCENARIO</span>
    <span id="scenario-text"></span>
  </div>

  <!-- Synthesis panel -->
  <div id="synthesis-panel" class="synthesis-panel hidden">
    <div class="synthesis-header" onclick="toggleSynthesis()">
      <span class="synthesis-label">LIVE ANALYSIS</span>
      <span class="synthesis-round" id="synthesis-round"></span>
      <span class="synthesis-toggle" id="synthesis-toggle">&#9660;</span>
    </div>
    <div class="synthesis-body" id="synthesis-body"></div>
  </div>

  <!-- Launch modal -->
  <div id="launch-modal" class="modal" onclick="if(event.target===this)closeLaunchModal()">
    <div class="modal-content launch-modal-content">
      <button class="modal-close" onclick="closeLaunchModal()">&times;</button>
      <div class="launch-modal-header">
        <h2>New Simulation</h2>
        <button class="dice-btn" onclick="shuffleScenario()" title="Random example scenario">&#127922;</button>
      </div>
      <div class="launch-modal-body">
        <div class="launch-field">
          <label for="launch-scenario">Scenario Prompt</label>
          <textarea id="launch-scenario" rows="5" placeholder="Describe the scenario to simulate...">Simulate the public reaction on social media after OpenAI announces that GPT-5 will cost $200/month for the Pro tier, while making the free tier significantly more limited. Explore reactions from AI developers, startup founders, students, competitors (Google, Anthropic, Meta), tech journalists, and everyday users debating accessibility, pricing, and the future of AI democratization.</textarea>
        </div>
        <div class="launch-field">
          <label for="launch-seed">Seed Document <span class="optional-tag">optional</span></label>
          <textarea id="launch-seed" rows="5" placeholder="Paste a news article, background context, or reference text to ground the simulation...">OpenAI CEO Sam Altman announced today that GPT-5, codenamed "Orion," will launch next month with a new pricing structure. The Pro tier jumps from $20/month to $200/month, offering unlimited GPT-5 access, advanced reasoning, and a 1M token context window. The free tier will be restricted to GPT-4o-mini with 10 messages per day. Altman stated: "Building frontier AI is extraordinarily expensive. We need sustainable pricing to continue pushing the boundaries." The announcement comes as Google DeepMind releases Gemini 3 Ultra for free, and Anthropic offers Claude 4 at $30/month. Tech Twitter erupted immediately, with #OpenAIGreed and #GPT5Pricing trending within hours. YC-backed startups report scrambling to evaluate alternatives, while enterprise customers express concerns about vendor lock-in.</textarea>
        </div>
        <div class="launch-bottom-row">
          <div class="launch-field launch-rounds-field">
            <label for="launch-rounds">Rounds</label>
            <input type="number" id="launch-rounds" value="10" min="1" max="100">
          </div>
          <div class="launch-actions">
            <div id="launch-status" class="launch-status"></div>
            <button class="primary launch-btn" id="btn-launch" onclick="launchSim()">Launch Simulation</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Main layout -->
  <main id="app">
    <!-- Left: Agents panel -->
    <aside id="agents-panel">
      <h2>Agents</h2>
      <div id="agents-filter">
        <button class="filter-btn active" onclick="filterAgents('all')">All</button>
        <button class="filter-btn" onclick="filterAgents('tier1')">VIP</button>
        <button class="filter-btn" onclick="filterAgents('tier2')">Std</button>
        <button class="filter-btn" onclick="filterAgents('tier3')">Fig</button>
      </div>
      <div id="agents-list"></div>
    </aside>

    <!-- Center: Feed -->
    <section id="feed-panel">
      <div id="feed-tabs">
        <button class="tab-btn active" onclick="switchTab('feed')">Live Feed</button>
        <button class="tab-btn" onclick="switchTab('trending')">Trending</button>
        <button class="tab-btn" onclick="switchTab('timeline')">Timeline</button>
        <button class="tab-btn" onclick="switchTab('dashboard')">Dashboard</button>
      </div>
      <div id="feed-content">
        <div id="feed-list" class="tab-content active"></div>
        <div id="trending-list" class="tab-content"></div>
        <div id="timeline-list" class="tab-content"></div>
        <div id="dashboard-content" class="tab-content"></div>
      </div>
    </section>

    <!-- Right: God's Eye -->
    <aside id="god-eye-panel">
      <h2>God's Eye</h2>

      <div class="god-eye-section">
        <h3>Inject Event</h3>
        <select id="event-type">
          <option value="breaking_news">Breaking News</option>
          <option value="viral_content">Viral Content</option>
          <option value="system_announcement">Announcement</option>
          <option value="agent_mood">Agent Mood Shift</option>
        </select>
        <textarea id="event-content" placeholder="Event content..." rows="3"></textarea>
        <div class="inject-row">
          <input type="number" id="event-round" placeholder="Round (optional)" min="1">
          <button onclick="injectEvent()">Inject</button>
        </div>
      </div>

      <div class="god-eye-section">
        <h3>Event Log</h3>
        <div id="event-log"></div>
      </div>

      <div class="god-eye-section" id="continue-section" style="display:none;">
        <h3>Continue Simulation</h3>
        <div class="inject-row">
          <input type="number" id="continue-rounds" value="5" min="1" max="100" placeholder="Rounds">
          <button class="primary" onclick="continueSim()">Continue</button>
        </div>
        <div id="continue-status" class="launch-status"></div>
      </div>

      <div class="god-eye-section">
        <h3>Stats</h3>
        <div id="stats-panel">
          <div class="stat"><span class="stat-label">Posts</span><span id="stat-posts">0</span></div>
          <div class="stat"><span class="stat-label">Likes</span><span id="stat-likes">0</span></div>
          <div class="stat"><span class="stat-label">Replies</span><span id="stat-replies">0</span></div>
          <div class="stat"><span class="stat-label">Reposts</span><span id="stat-reposts">0</span></div>
          <div class="stat"><span class="stat-label">Actions</span><span id="stat-actions">0</span></div>
        </div>
      </div>
    </aside>
  </main>

  <!-- Agent detail modal -->
  <div id="agent-modal" class="modal" onclick="if(event.target===this)closeModal()">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <div id="agent-detail"></div>
    </div>
  </div>

  <script src="components.js"></script>
  <script src="app.js"></script>
</body>
</html>
